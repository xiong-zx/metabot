name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Memory Core merge hygiene
        run: npm run check:merge-hygiene:memory-core

      # Workspace test suites (packages/cli, metamemory, skill-hub) import the
      # compiled entry of these thin libraries (@xvirobotics/cli-core etc.,
      # exports -> dist/). `tsc --noEmit` above does not emit, so build them
      # before running tests or the imports fail to resolve.
      - name: Build workspace libraries
        run: npm run build -w @xvirobotics/cli-core -w @xvirobotics/metamemory -w @xvirobotics/skill-hub

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
