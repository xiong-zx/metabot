# oauth2-proxy config for metabot-core on the dedicated front-door host
# `metabot-core.xvirobotics.com`.
#
# Installed path on the deploy box (172.31.32.2):
#   /etc/oauth2-proxy-metabot-core/oauth2-proxy.cfg
# (matches the new systemd unit `oauth2-proxy-metabot-core.service`'s
# `--config=` arg; do NOT install under the generic `/etc/oauth2-proxy/`
# path — there are co-tenant oauth2-proxy instances on this host).
#
# What changed (P4-MR7, 2026-05-19 — host-reality fix):
#   - Rename: this file was `oauth2-proxy-mbcore.cfg`; renamed to
#     `oauth2-proxy-metabot-core.cfg` to match the new isolated systemd unit.
#     The OLD `oauth2-proxy-mbcore.service` is STILL RUNNING on :4180
#     serving the legacy `metabot-core-ui.xvirobotics.com` during the 24h
#     soak — DO NOT touch it. This file is for the NEW unit only.
#   - **Port: 4180 → 4182.** :4180 is owned by the legacy unit.
#   - **Cookie name renamed** `_mbcore_oauth2_proxy` → `_mbportal_oauth2_proxy`
#     so a browser that visits both `metabot-core.xvirobotics.com` and the
#     legacy `metabot-core-ui.xvirobotics.com` during soak can't cross-pollinate
#     session cookies between the two oauth2-proxy units (they share host +
#     same Feilian app 5653 but different cookie_domains).
#   - Same Feilian OIDC app (5653) as the legacy unit — the OIDC client_id /
#     client_secret pattern is unchanged; `/etc/feilian/metabot_core_oidc.env`
#     works for both units because the app is the same semantic owner. Only
#     the redirect_url surface differs (added to the app in Phase A pre-flight).
#   - **cookie_secret is fresh + independent for this unit** at
#     `/etc/oauth2-proxy-metabot-core/cookie.env` (Option B). The legacy unit
#     keeps its own cookie_secret in its own EnvironmentFile — so rotation
#     or eventual legacy decommission can't cross-couple sessions. See the
#     systemd unit for the two EnvironmentFile lines.
#
# Caddy reverse-proxies non-Bearer traffic for `metabot-core.xvirobotics.com`
# to the address below; this proxy validates the Feilian (飞连) OIDC session
# and forwards to the metabot-core backend with X-Forwarded-Email.
#
# Authorization rule (CARRY-OVER, do NOT regress):
#   email_domains is the SOLE gate (no authenticated_emails_file). v7.x
#   silently treats the two as OR, not AND — well-known footgun from the
#   Model B bring-up. Pick one.
#
# Secrets:
#   - client_id / client_secret  →  /etc/feilian/metabot_core_oidc.env
#   - cookie_secret              →  /etc/oauth2-proxy-metabot-core/cookie.env
# Both are injected via EnvironmentFile on the host and are NEVER committed.

# ---- bind ---------------------------------------------------------------

# :4182 — distinct from the legacy :4180 unit. The Caddy snippet for
# metabot-core.xvirobotics.com reverse-proxies non-Bearer traffic here.
http_address  = "127.0.0.1:4182"
reverse_proxy = true

# Caddy terminates TLS; this proxy speaks plain HTTP to the backend.
# Upstream is the metabot-core server on the same host.
upstreams = [
  "http://127.0.0.1:9200/",
]

# ---- provider: Feilian OIDC --------------------------------------------

provider                 = "oidc"
oidc_issuer_url          = "https://xvirobotics.feilian.cn"
# client_id / client_secret are injected via EnvironmentFile
# (OAUTH2_PROXY_CLIENT_ID / OAUTH2_PROXY_CLIENT_SECRET on the host).
scope                    = "openid email profile"
skip_provider_button     = true
prefer_email_to_user     = false  # MANDATORY: true silently eats X-Forwarded-Email

# Header forwarding to the backend
pass_user_headers           = true
set_xauthrequest            = true
pass_access_token           = false
pass_authorization_header   = false
set_authorization_header    = false

# ---- session cookie ----------------------------------------------------

cookie_name      = "_mbportal_oauth2_proxy"
cookie_secure    = true
cookie_samesite  = "lax"
cookie_domains   = ["metabot-core.xvirobotics.com"]
# cookie_secret comes from /etc/oauth2-proxy-metabot-core/cookie.env
# (OAUTH2_PROXY_COOKIE_SECRET, 32B base64). Fresh + independent from the
# legacy unit's cookie_secret — see header for rationale.

# ---- redirect / routing -----------------------------------------------

# OIDC redirect URL Feilian sees; matches the registered redirect on the app.
redirect_url     = "https://metabot-core.xvirobotics.com/oauth2/callback"
whitelist_domains = ["metabot-core.xvirobotics.com"]

# Paths that are open without any auth (no session loaded, no headers
# injected, no challenge). Keep the surface MINIMAL — every entry here is
# attack surface. /api/manifest is the SPA self-bootstrap probe, /ping is
# kept as a generic liveness probe for ops compatibility (harmless 404 from
# upstream if not implemented).
skip_auth_routes = [
  "GET=^/api/manifest$",
  "GET=^/ping$",
]

# Paths that MUST be authenticated and return 401 (not 302) on miss.
# Used by the SPA's XHR layer — fetch() catches the 401 and does a hard
# redirect to /oauth2/sign_in. Without api_routes, oauth2-proxy 302s on
# unauth, which the SPA can't see (browser follows transparently).
#
# Single catch-all entry: every /api/* prefix funnels through here. Tests
# that need to be unauthenticated must be added to skip_auth_routes above.
# Specifically excludes nothing — admin/* + non-api paths default to the
# full SSO flow (302 → Feilian), which is correct for full-page browser
# loads.
api_routes = [
  "^/api/",
]

# ---- authorization: domain-only gate ----------------------------------

# SOLE gate. xvirobotics.com domain → allowed; everything else → 403.
# DO NOT also set `authenticated_emails_file` — oauth2-proxy v7.x treats
# the two as OR (silent), so adding both effectively widens access to the
# union. See bug surfaced in the Model B bring-up.
email_domains = ["xvirobotics.com"]
